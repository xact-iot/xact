services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-xact}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-xact} -d $${POSTGRES_DB:-xact}"]
      interval: 10s
      timeout: 5s
      retries: 12

  xact:
    image: ${XACT_IMAGE:-ghcr.io/xact-iot/xact:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      XACT_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-xact}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-xact}?sslmode=disable
      STATIC_SERVE_MODE: server
      STATIC_DIR: /opt/xact/web
      PLUGIN_DIR: /opt/xact/plugins
      API_HOST: 0.0.0.0
      API_PORT: 8080
      NATS_HOST: 0.0.0.0
      NATS_PORT: 4222
      NATS_WS_HOST: 0.0.0.0
      NATS_WS_PORT: 9222
      NATS_WS_PATH: /xact/ws
      NATS_STORE_DIR: /var/lib/xact/nats-store
      NATS_LOG_FILE: /var/log/xact/nats.log
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      NATS_INTERNAL_PASSWORD: ${NATS_INTERNAL_PASSWORD:?set NATS_INTERNAL_PASSWORD in .env}
      NATS_BROWSER_TOKEN: ${NATS_BROWSER_TOKEN:?set NATS_BROWSER_TOKEN in .env}
      EMBEDDED_MQTT_SERVER: ${EMBEDDED_MQTT_SERVER:-yes}
      MQTT_URL: ${MQTT_URL:-mqtt://0.0.0.0:1883}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD:?set MQTT_BROKER_PASSWORD in .env}
      MQTT_CLIENT_ENABLED: ${MQTT_CLIENT_ENABLED:-yes}
      MQTT_CLIENT_URL: ${MQTT_CLIENT_URL:-mqtt://127.0.0.1:1883}
      MQTT_CLIENT_USERNAME: ${MQTT_CLIENT_USERNAME:-xact}
      MQTT_CLIENT_TLS_CA_FILE: ${MQTT_CLIENT_TLS_CA_FILE:-}
      MQTT_CLIENT_TLS_SERVER_NAME: ${MQTT_CLIENT_TLS_SERVER_NAME:-}
      MQTT_CLIENT_TLS_INSECURE_SKIP_VERIFY: ${MQTT_CLIENT_TLS_INSECURE_SKIP_VERIFY:-false}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-180}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-0}
      ENABLE_UNSAFE_SCHEDULER_TASKS: ${ENABLE_UNSAFE_SCHEDULER_TASKS:-no}
      NATS_BROWSER_ALLOW_COMMANDS: ${NATS_BROWSER_ALLOW_COMMANDS:-no}
      XACT_BOOTSTRAP_ADMIN_PASSWORD: ${XACT_BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - xact-nats:/var/lib/xact/nats-store
      - xact-logs:/var/log/xact
      - ${XACT_PLUGIN_DIR:-./plugins}:/opt/xact/plugins
    expose:
      - "9222"

    ports:
      - "8080:8080"
      - "4222:4222"
      - "1883:1883"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/xact/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      xact:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      XACT_SITE_ADDRESS: ${XACT_SITE_ADDRESS:-localhost}
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'CADDYEOF'
        {$$XACT_SITE_ADDRESS:localhost} {
          encode zstd gzip

          reverse_proxy /xact/ws* xact:9222
          reverse_proxy /xact* xact:8080

          redir / /xact/ 302
        }
        CADDYEOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  xact-nats:
  xact-logs:
  caddy-data:
  caddy-config:
