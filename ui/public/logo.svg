<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#0c0f14"/>
  <rect width="100" height="100" rx="16" fill="url(#hubGlow)"/>

  <!-- Outer border ring -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="15" fill="none"
        stroke="#f59e0b" stroke-width="0.75" opacity="0.18"/>

  <!-- Background grid dots - technical precision texture -->
  <g fill="#f59e0b" opacity="0.1">
    <circle cx="34" cy="34" r="1.2"/><circle cx="50" cy="34" r="1.2"/><circle cx="66" cy="34" r="1.2"/>
    <circle cx="34" cy="50" r="1.2"/>                                   <circle cx="66" cy="50" r="1.2"/>
    <circle cx="34" cy="66" r="1.2"/><circle cx="50" cy="66" r="1.2"/><circle cx="66" cy="66" r="1.2"/>
    <!-- Outer ring dots -->
    <circle cx="18" cy="18" r="0.9" opacity="0.6"/><circle cx="50" cy="14" r="0.9" opacity="0.6"/><circle cx="82" cy="18" r="0.9" opacity="0.6"/>
    <circle cx="14" cy="50" r="0.9" opacity="0.6"/>                                                   <circle cx="86" cy="50" r="0.9" opacity="0.6"/>
    <circle cx="18" cy="82" r="0.9" opacity="0.6"/><circle cx="50" cy="86" r="0.9" opacity="0.6"/><circle cx="82" cy="82" r="0.9" opacity="0.6"/>
  </g>

  <!-- X trace arms - circuit traces from corner nodes to hub -->
  <line x1="22" y1="22" x2="41" y2="41" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="78" y1="22" x2="59" y2="41" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="78" x2="41" y2="59" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="78" y1="78" x2="59" y2="59" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Signal waveform - real-time monitoring pulse, runs left/right of hub -->
  <path d="M 8 50 L 18 50 L 22 41 L 27 59 L 32 41 L 37 50 L 42 50"
        stroke="#f59e0b" stroke-width="1.4" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M 58 50 L 63 50 L 67 41 L 72 59 L 77 41 L 82 50 L 92 50"
        stroke="#f59e0b" stroke-width="1.4" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Center server hub - outer glow halo -->
  <circle cx="50" cy="50" r="14" fill="#f59e0b" opacity="0.07"/>
  <!-- Hub ring -->
  <circle cx="50" cy="50" r="11" fill="#0c0f14" stroke="#f59e0b" stroke-width="2"/>
  <!-- Hub fill ring -->
  <circle cx="50" cy="50" r="5.5" fill="#f59e0b" opacity="0.9"/>
  <!-- Hub center void -->
  <circle cx="50" cy="50" r="2.5" fill="#0c0f14"/>

  <!-- Corner IoT endpoint nodes - hollow ring + inner dot -->
  <g stroke="#f59e0b" stroke-width="1.5" fill="#0c0f14">
    <circle cx="22" cy="22" r="6"/>
    <circle cx="78" cy="22" r="6"/>
    <circle cx="22" cy="78" r="6"/>
    <circle cx="78" cy="78" r="6"/>
  </g>
  <g fill="#f59e0b">
    <circle cx="22" cy="22" r="2.5"/>
    <circle cx="78" cy="22" r="2.5"/>
    <circle cx="22" cy="78" r="2.5"/>
    <circle cx="78" cy="78" r="2.5"/>
  </g>
</svg>
