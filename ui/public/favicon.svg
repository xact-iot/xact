<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0c0f14"/>
  <rect width="32" height="32" rx="6" fill="url(#g)"/>
  <!-- X traces - arms stop at the center hub ring -->
  <line x1="7.5" y1="7.5" x2="13.2" y2="13.2" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="24.5" y1="7.5" x2="18.8" y2="13.2" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="7.5" y1="24.5" x2="13.2" y2="18.8" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="24.5" y1="24.5" x2="18.8" y2="18.8" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Center hub: ring + inner dot -->
  <circle cx="16" cy="16" r="3.8" fill="#0c0f14" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="1.5" fill="#f59e0b"/>
  <!-- Corner IoT endpoint nodes -->
  <circle cx="7.5" cy="7.5" r="2.5" fill="#f59e0b"/>
  <circle cx="24.5" cy="7.5" r="2.5" fill="#f59e0b"/>
  <circle cx="7.5" cy="24.5" r="2.5" fill="#f59e0b"/>
  <circle cx="24.5" cy="24.5" r="2.5" fill="#f59e0b"/>
</svg>
