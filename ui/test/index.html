<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Test Runner</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        h1 { 
            color: #fff; 
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 20px;
        }
        .controls {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #45a049; }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        button.secondary {
            background: #555;
        }
        button.secondary:hover {
            background: #666;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-badge.running {
            background: #ff9800;
            color: white;
        }
        .status-badge.passed {
            background: #4CAF50;
            color: white;
        }
        .status-badge.failed {
            background: #f44336;
            color: white;
        }
        .status-badge.idle {
            background: #555;
            color: #ccc;
        }
        .summary {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .summary-item {
            background: #333;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .summary-item .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .summary-item .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .summary-item.passed .value { color: #4CAF50; }
        .summary-item.failed .value { color: #f44336; }
        .summary-item.duration .value { color: #2196F3; }
        
        .suite {
            background: #2a2a2a;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .suite-header {
            padding: 15px 20px;
            background: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        .suite-header:hover {
            background: #3a3a3a;
        }
        .suite-header.passed {
            border-left: 4px solid #4CAF50;
        }
        .suite-header.failed {
            border-left: 4px solid #f44336;
        }
        .suite-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .suite-toggle {
            font-size: 12px;
            color: #888;
            transition: transform 0.2s;
            width: 16px;
            text-align: center;
        }
        .suite.collapsed .suite-toggle {
            transform: rotate(-90deg);
        }
        .suite-name {
            font-weight: 600;
            font-size: 16px;
        }
        .suite-stats {
            font-size: 13px;
            color: #888;
        }
        .suite-content {
            padding: 10px 20px 20px;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out;
            max-height: 10000px;
            opacity: 1;
        }
        .suite.collapsed .suite-content {
            max-height: 0;
            opacity: 0;
            padding: 0 20px;
        }
        .test {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .test.passed {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4CAF50;
        }
        .test.failed {
            background: rgba(244, 67, 54, 0.1);
            border-left: 3px solid #f44336;
        }
        .test-icon {
            font-weight: bold;
            font-size: 16px;
        }
        .test.passed .test-icon { color: #4CAF50; }
        .test.failed .test-icon { color: #f44336; }
        .test-name {
            flex: 1;
        }
        .test-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .test-rerun-btn {
            background: #555;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
        }
        .test-rerun-btn:hover {
            opacity: 1;
            background: #666;
        }
        .test-rerun-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .test-duration {
            font-size: 12px;
            color: #666;
        }
        .test-error {
            background: #1a1a1a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #f44336;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h2 {
            color: #888;
            margin-bottom: 10px;
        }
        
        /* Hot reload indicator */
        #reload-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        #reload-indicator.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Browser Test Runner</h1>
    <div class="subtitle">Hot reload enabled - Tests will re-run when files change</div>
    
    <div id="reload-indicator">Reloading...</div>
    
    <div class="controls">
        <button id="runBtn" onclick="runTests()">Run Tests</button>
        <button class="secondary" onclick="clearResults()">Clear</button>
        <button class="secondary" onclick="expandAll()">Expand All</button>
        <button class="secondary" onclick="collapseAll()">Collapse All</button>
        <button class="secondary" onclick="expandFailedOnly()">Expand Failed</button>
        <div id="statusBadge" class="status-badge idle">Idle</div>
    </div>
    
    <div id="summary" class="summary" style="display: none;">
        <h3>Summary</h3>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="value" id="totalSuites">0</div>
                <div class="label">Suites</div>
            </div>
            <div class="summary-item">
                <div class="value" id="totalTests">0</div>
                <div class="label">Tests</div>
            </div>
            <div class="summary-item passed">
                <div class="value" id="passedTests">0</div>
                <div class="label">Passed</div>
            </div>
            <div class="summary-item failed">
                <div class="value" id="failedTests">0</div>
                <div class="label">Failed</div>
            </div>
            <div class="summary-item duration">
                <div class="value" id="duration">0ms</div>
                <div class="label">Duration</div>
            </div>
        </div>
    </div>
    
    <div id="results">
        <div class="empty-state">
            <h2>No tests run yet</h2>
            <p>Click "Run Tests" to start testing</p>
        </div>
    </div>

    <script type="module">
        import { loadAndRunTests } from './loader.ts';
        import { runSingleTest } from './framework.ts';

        let isRunning = false;

        window.runTests = async function() {
            if (isRunning) return;
            isRunning = true;
            
            const runBtn = document.getElementById('runBtn');
            const statusBadge = document.getElementById('statusBadge');
            const resultsEl = document.getElementById('results');
            const summaryEl = document.getElementById('summary');
            
            runBtn.disabled = true;
            statusBadge.className = 'status-badge running';
            statusBadge.textContent = 'Running';
            resultsEl.innerHTML = '';
            summaryEl.style.display = 'none';
            
            const suitesEl = document.createElement('div');
            resultsEl.appendChild(suitesEl);
            
            await loadAndRunTests(
                (suite) => {
                    renderSuite(suitesEl, suite);
                },
                (info) => {
                    renderSummary(info);
                    statusBadge.className = info.failedTests > 0 ? 'status-badge failed' : 'status-badge passed';
                    statusBadge.textContent = info.failedTests > 0 ? 'Failed' : 'Passed';
                    runBtn.disabled = false;
                    isRunning = false;
                }
            );
        };

        window.clearResults = function() {
            document.getElementById('results').innerHTML = `
                <div class="empty-state">
                    <h2>No tests run yet</h2>
                    <p>Click "Run Tests" to start testing</p>
                </div>
            `;
            document.getElementById('summary').style.display = 'none';
            document.getElementById('statusBadge').className = 'status-badge idle';
            document.getElementById('statusBadge').textContent = 'Idle';
        };

        window.expandAll = function() {
            document.querySelectorAll('.suite').forEach(suite => {
                suite.classList.remove('collapsed');
            });
        };

        window.collapseAll = function() {
            document.querySelectorAll('.suite').forEach(suite => {
                suite.classList.add('collapsed');
            });
        };

        window.expandFailedOnly = function() {
            document.querySelectorAll('.suite').forEach(suite => {
                const header = suite.querySelector('.suite-header');
                if (header.classList.contains('failed')) {
                    suite.classList.remove('collapsed');
                } else {
                    suite.classList.add('collapsed');
                }
            });
        };

        function renderSuite(container, suite) {
            // Remove existing suite if present
            const existing = document.getElementById(`suite-${suite.name}`);
            if (existing) {
                existing.remove();
            }
            
            const suiteEl = document.createElement('div');
            suiteEl.className = 'suite';
            suiteEl.id = `suite-${suite.name}`;
            
            const passedTests = suite.tests.filter(t => t.passed).length;
            const totalTests = suite.tests.length;
            
            suiteEl.innerHTML = `
                <div class="suite-header ${suite.passed ? 'passed' : 'failed'}" title="Click to collapse/expand">
                    <div class="suite-title">
                        <span class="suite-toggle" title="Toggle">▼</span>
                        <div class="suite-name">${suite.name}</div>
                    </div>
                    <div class="suite-stats">${passedTests}/${totalTests} passed</div>
                </div>
                <div class="suite-content">
                    ${suite.tests.map(test => `
                        <div class="test ${test.passed ? 'passed' : 'failed'}" id="test-${suite.name}-${test.name}">
                            <span class="test-icon">${test.passed ? '✓' : '✗'}</span>
                            <span class="test-name">${test.name}</span>
                            <div class="test-actions">
                                <button class="test-rerun-btn" onclick="rerunTest('${suite.name}', '${test.name}')" title="Re-run this test">↻ Re-run</button>
                                <span class="test-duration">${Math.round(test.duration)}ms</span>
                            </div>
                        </div>
                        ${!test.passed ? `<div class="test-error" id="error-${suite.name}-${test.name}">${test.error}</div>` : ''}
                    `).join('')}
                </div>
            `;
            
            // Add click handler for collapsing/expanding
            const header = suiteEl.querySelector('.suite-header');
            header.addEventListener('click', () => {
                suiteEl.classList.toggle('collapsed');
            });
            
            container.appendChild(suiteEl);
        }

        window.rerunTest = async function(suiteName, testName) {
            const testEl = document.getElementById(`test-${suiteName}-${testName}`);
            const rerunBtn = testEl.querySelector('.test-rerun-btn');
            const durationEl = testEl.querySelector('.test-duration');
            
            rerunBtn.disabled = true;
            rerunBtn.textContent = 'Running...';
            
            try {
                const result = await runSingleTest(suiteName, testName);
                
                if (result) {
                    // Update test visual state
                    testEl.className = `test ${result.passed ? 'passed' : 'failed'}`;
                    testEl.querySelector('.test-icon').textContent = result.passed ? '✓' : '✗';
                    durationEl.textContent = `${Math.round(result.duration)}ms`;
                    
                    // Update error display
                    const existingError = document.getElementById(`error-${suiteName}-${testName}`);
                    if (existingError) {
                        existingError.remove();
                    }
                    if (!result.passed) {
                        const errorEl = document.createElement('div');
                        errorEl.className = 'test-error';
                        errorEl.id = `error-${suiteName}-${testName}`;
                        errorEl.textContent = result.error;
                        testEl.insertAdjacentElement('afterend', errorEl);
                    }
                    
                    // Update suite header stats
                    const suiteEl = document.getElementById(`suite-${suiteName}`);
                    const header = suiteEl.querySelector('.suite-header');
                    const allTests = suiteEl.querySelectorAll('.test');
                    const passedTests = Array.from(allTests).filter(t => t.classList.contains('passed')).length;
                    const totalTests = allTests.length;
                    
                    suiteEl.querySelector('.suite-stats').textContent = `${passedTests}/${totalTests} passed`;
                    header.className = `suite-header ${passedTests === totalTests ? 'passed' : 'failed'}`;
                }
            } catch (error) {
                console.error('Failed to re-run test:', error);
            } finally {
                rerunBtn.disabled = false;
                rerunBtn.textContent = '↻ Re-run';
            }
        };

        function renderSummary(info) {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('totalSuites').textContent = info.totalSuites;
            document.getElementById('totalTests').textContent = info.totalTests;
            document.getElementById('passedTests').textContent = info.passedTests;
            document.getElementById('failedTests').textContent = info.failedTests;
            document.getElementById('duration').textContent = Math.round(info.duration) + 'ms';
        }

        // Auto-run tests on load
        runTests();

        // Handle hot reload
        if (import.meta.hot) {
            import.meta.hot.accept(() => {
                const indicator = document.getElementById('reload-indicator');
                indicator.classList.add('visible');
                setTimeout(() => {
                    indicator.classList.remove('visible');
                }, 1000);
                
                // Re-run tests after hot reload
                setTimeout(() => {
                    runTests();
                }, 100);
            });
        }
    </script>
</body>
</html>
