<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XACT</title>
  <link rel="icon" type="image/svg+xml" href="/xact/favicon.svg">

  <script>
    // Apply theme before app loads to prevent flash
    (function() {
      const savedTheme = localStorage.getItem('xact-theme') || 'dark-navy';
      const savedWidgetDecoration = localStorage.getItem('xact-widget-decoration') || 'shadowed';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.documentElement.setAttribute('data-widget-decoration', savedWidgetDecoration);
    })();
  </script>
  <style>
    /* Fallback styles while app loads */
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
    #app { height: 100vh; width: 100vw; }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 9999;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading XACT...</div>
  </div>
  
  <div id="app">
    <app-sidebar></app-sidebar>
    <app-header></app-header>
    <app-content></app-content>
    <app-footer></app-footer>
  </div>
  <preferences-dialog></preferences-dialog>
  <profile-dialog></profile-dialog>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
